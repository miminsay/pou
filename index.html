<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo da Velha com Som</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #1e1e1e;
    color: #fff;
    font-family: Arial, sans-serif;
  }
  h1 {
    margin-bottom: 20px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-gap: 5px;
  }
  .cell {
    width: 100px;
    height: 100px;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3em;
    cursor: pointer;
    transition: background 0.3s;
  }
  .cell:hover {
    background: #555;
  }
  #winner {
    margin-top: 20px;
    font-size: 1.5em;
  }
</style>
</head>
<body>
<h1>Jogo da Velha 🎵</h1>
<div class="board">
  <div class="cell" data-index="0"></div>
  <div class="cell" data-index="1"></div>
  <div class="cell" data-index="2"></div>
  <div class="cell" data-index="3"></div>
  <div class="cell" data-index="4"></div>
  <div class="cell" data-index="5"></div>
  <div class="cell" data-index="6"></div>
  <div class="cell" data-index="7"></div>
  <div class="cell" data-index="8"></div>
</div>
<div id="winner"></div>

<audio id="soundX" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="soundO" src="https://www.soundjay.com/button/sounds/button-09.mp3"></audio>
<audio id="soundWin" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>

<script>
  const cells = document.querySelectorAll('.cell');
  const winnerText = document.getElementById('winner');
  const soundX = document.getElementById('soundX');
  const soundO = document.getElementById('soundO');
  const soundWin = document.getElementById('soundWin');

  let board = Array(9).fill('');
  let currentPlayer = 'X';
  let gameOver = false;

  const winCombos = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const idx = cell.dataset.index;
      if (board[idx] === '' && !gameOver) {
        board[idx] = currentPlayer;
        cell.textContent = currentPlayer;
        if(currentPlayer === 'X') soundX.play();
        else soundO.play();
        checkWinner();
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      }
    });
  });

  function checkWinner() {
    for(const combo of winCombos) {
      const [a,b,c] = combo;
      if(board[a] && board[a] === board[b] && board[a] === board[c]) {
        winnerText.textContent = ${board[a]} venceu! 🎉;
        soundWin.play();
        gameOver = true;
        return;
      }
    }
    if(!board.includes('')) {
      winnerText.textContent = "Empate! 😐";
      gameOver = true;
    }
  }
</script>
</body>
</html>
